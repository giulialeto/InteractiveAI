# Resolver line is replaced at runtime by start-webui.sh
resolver 127.0.0.11 ipv6=off;

server {
    listen       80;
    server_name  localhost;

    gzip on;
    gzip_types application/javascript text/css;

    # Serve the SPA; fall back to index.html for client-side routing
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy for the INESCTEC cognitive API (avoids browser CORS restrictions)
    location /cognitive-api/ {
        proxy_set_header Host wesenss.inesctec.pt;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
        proxy_pass https://wesenss.inesctec.pt/api/v1/;
    }

    # Proxy for the RL agent API (used in local Docker env where the backend
    # cannot reach the company-internal hostname; OVH backend calls it directly)
    location /rl-api/ {
        proxy_set_header Host interactiveagent.passerelle.irt-systemx.fr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_pass_header Authorization;
        proxy_set_header Authorization $http_authorization;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
        proxy_pass https://interactiveagent.passerelle.irt-systemx.fr/api/v1/;
    }
}
