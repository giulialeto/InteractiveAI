name: Build and Push Docker Images

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  DOCKERHUB_ORGANIZATION: irtsystemx
  REGISTRY: docker.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: Deployment
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - service: cab-capitalization
            dockerfile: backend/Capitalization-Service-Dockerfile
            context: backend
          - service: cab-context
            dockerfile: backend/Context-Service-Dockerfile
            context: backend
          - service: cab-event
            dockerfile: backend/Event-Service-Dockerfile
            context: backend
          - service: cab-historic
            dockerfile: backend/Historic-Service-Dockerfile
            context: backend
          - service: cab-recommendation
            dockerfile: backend/Recommendation-Service-Dockerfile
            context: backend
          - service: cab-common
            dockerfile: backend/cab_common/Dockerfile
            context: backend/cab_common
          - service: cab-standalone-frontend
            dockerfile: frontend/Dockerfile
            context: frontend
          - service: powergrid-app
            dockerfile: usecases_examples/PowerGrid/Dockerfile.app
            context: usecases_examples/PowerGrid
          - service: powergrid-api
            dockerfile: usecases_examples/PowerGrid/Dockerfile.api
            context: usecases_examples/PowerGrid

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.DOCKERHUB_ORGANIZATION }}/interactiveai-${{ matrix.service }}
          tags: |
            type=semver,pattern={{version}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.service == 'cab-standalone-frontend' && format('VITE_COGNITIVE_TOKEN={0}', secrets.VITE_COGNITIVE_TOKEN) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
